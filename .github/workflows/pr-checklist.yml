name: PR Checklist Auto-check

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

concurrency:
  group: pr-checklist-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

permissions:
  pull-requests: write

jobs:
  update-checklist:
    if: github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Auto-tick checklist items
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          CI_RESULT: ${{ github.event.workflow_run.conclusion }}
        run: |
          set -euo pipefail

          # Find the PR associated with this workflow run
          PR_NUMBER=$(gh api "repos/${REPO}/commits/${HEAD_SHA}/pulls" \
            --jq '.[0].number' 2>/dev/null || echo "")

          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            echo "No PR found for commit ${HEAD_SHA}, skipping"
            exit 0
          fi

          echo "Updating checklist for PR #${PR_NUMBER} (CI result: ${CI_RESULT})"

          # Fetch current PR body and branch name
          PR_DATA=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json body,headRefName)
          BRANCH=$(echo "$PR_DATA" | jq -r '.headRefName')

          # Write body to temp file for safe sed operations
          echo "$PR_DATA" | jq -r '.body' > /tmp/pr_body.txt

          # ── Auto-tick: branch naming convention ──────────────────
          BRANCH_PATTERN='^(feat|fix|test|docs|refactor)/[A-Za-z0-9]+-.*$'
          if [[ "$BRANCH" =~ $BRANCH_PATTERN ]]; then
            sed -i 's/- \[ \] De naamgeving van mijn branch volgt de conventie/- [x] De naamgeving van mijn branch volgt de conventie/' /tmp/pr_body.txt
            echo "✓ Branch naming convention: passed"
          else
            sed -i 's/- \[x\] De naamgeving van mijn branch volgt de conventie/- [ ] De naamgeving van mijn branch volgt de conventie/' /tmp/pr_body.txt
            echo "✗ Branch naming convention: failed"
          fi

          # ── Auto-tick: CI checks pass ────────────────────────────
          if [ "$CI_RESULT" = "success" ]; then
            sed -i 's/- \[ \] CI checks slagen (unit tests, frontend build)/- [x] CI checks slagen (unit tests, frontend build)/' /tmp/pr_body.txt
            echo "✓ CI checks: passed"
          else
            sed -i 's/- \[x\] CI checks slagen (unit tests, frontend build)/- [ ] CI checks slagen (unit tests, frontend build)/' /tmp/pr_body.txt
            echo "✗ CI checks: failed"
          fi

          # ── Auto-tick: beschrijving and testability filled ───────
          BODY=$(cat /tmp/pr_body.txt)

          # Check if Beschrijving section has content (not just HTML comments or whitespace)
          BESCHRIJVING=$(echo "$BODY" | sed -n '/## Beschrijving/,/## /p' | grep -v '^##' | grep -v '<!--' | grep -v '^\s*$' | head -1 || echo "")
          if [ -n "$BESCHRIJVING" ]; then
            sed -i 's/- \[ \] De beschrijving en testability-sectie zijn ingevuld/- [x] De beschrijving en testability-sectie zijn ingevuld/' /tmp/pr_body.txt
            echo "✓ Description sections: filled"
          fi

          # Update the PR body
          gh pr edit "$PR_NUMBER" --repo "$REPO" --body-file /tmp/pr_body.txt
          echo "Checklist updated for PR #${PR_NUMBER}"
