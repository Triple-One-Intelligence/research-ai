name: Claude Code Review

on:
  pull_request:
    types: [opened, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      review_scope:
        description: "Files or directories to review (e.g., 'api/app/routers/' or 'api/app/main.py')"
        required: true
        type: string
      review_focus:
        description: "What to focus on"
        required: false
        type: choice
        options:
          - full-review
          - security-only
          - test-suggestions
          - code-quality
        default: full-review
      branch:
        description: "Branch to review (defaults to current default branch)"
        required: false
        type: string

jobs:
  # ──────────────────────────────────────────────
  # Full code review on PR open / reopen
  # ──────────────────────────────────────────────
  pr-review:
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]' && (github.event.pull_request.author_association == 'OWNER' || github.event.pull_request.author_association == 'MEMBER')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          classify_inline_comments: "false"
          claude_args: >-
            --model claude-opus-4-6
            --allowedTools
            "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,Glob,Grep"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are a senior code reviewer for the research-ai project (FastAPI + React + Neo4j/Ricgraph).

            IMPORTANT: Only review CHANGED files. Do NOT review the entire codebase.

            ## Steps
            1. Run `gh pr view ${{ github.event.pull_request.number }}` for PR details and HEAD SHA.
            2. Run `gh pr diff ${{ github.event.pull_request.number }}` to see the diff.
            3. Review ONLY the changes in the diff. You may read related files for context if needed.
            4. For EACH issue, post a SEPARATE inline comment using `mcp__github_inline_comment__create_inline_comment`.
            5. After all inline comments, post ONE summary comment using `gh pr comment`.

            ## How to post inline comments

            Use `mcp__github_inline_comment__create_inline_comment` with these parameters:
            - `path`: the file path relative to repo root
            - `line`: the ending line number in the NEW version of the file (right side of diff)
            - `startLine`: (optional) starting line for multi-line comments
            - `side`: always use `"RIGHT"` unless commenting on deleted code (use `"LEFT"`)
            - `confirmed`: always set to `true` so comments post immediately
            - `body`: the comment body in markdown (see format below)

            ## Inline comment body format

            There are TWO formats. Choose based on whether the fix can be expressed as a direct code replacement.

            ### Format A — FIXABLE (use whenever the code can be directly replaced)
            Use a GitHub suggestion block. This gives the author a one-click "Commit suggestion" button.
            Prefer this format whenever possible — it's the best developer experience.

            {SEVERITY_EMOJI} **{Severity}** — {Category}

            {One-line description of the problem and why it matters.}

            ```suggestion
            {the corrected code that will REPLACE the entire selected line range}
            ```

            > 💡 {Optional: brief note if additional changes are needed elsewhere, e.g. "Also add `from X import Y` at the top of the file."}

            ### Format B — NON-FIXABLE (architectural issues, missing features, design concerns)
            Use when the issue can't be fixed by replacing the selected lines — e.g., "this entire endpoint should
            not exist", "add authentication middleware to the router", "this needs a completely different approach".

            {SEVERITY_EMOJI} **{Severity}** — {Category}

            {Clear description of the problem, why it matters, and what the developer should do about it.
            Be specific and actionable — don't just say "fix this", explain the approach.}

            ### Format C — TEST (missing test coverage)
            Use for suggesting new tests. These can't be suggested inline.

            🧪 **Test** — Missing test coverage

            {What needs testing and why.}

            ```python
            {example pytest code}
            ```

            ### Rules for suggestion blocks (Format A):
            - The suggestion block REPLACES the ENTIRE line range from startLine to line.
            - The replacement must be syntactically complete and valid.
            - Include proper indentation matching the file.
            - Do NOT include lines outside the startLine-line range.
            - For single-line fixes, omit startLine and only set line.

            ### Choosing the right format:
            - Hardcoded secret → Format A (replace with os.environ["..."])
            - Bare except → Format A (replace with except Exception)
            - Cypher injection → Format A (replace with parameterized query)
            - "This entire endpoint should be removed" → Format B
            - "All routes need authentication" → Format B
            - "Missing tests for X" → Format C

            ## Severity levels
            - 🔴 **Critical** — Must fix before merge (security vulnerabilities, data loss, breaking bugs)
            - 🟡 **Warning** — Should fix (potential bugs, missing error handling, performance issues)
            - 🔵 **Suggestion** — Consider fixing (code quality, readability, best practices)
            - 🧪 **Test** — Missing test coverage (include example pytest code)

            ## Review categories — check ALL for EVERY changed file

            ### 1. Security
            Hardcoded secrets, injection (SQL/Cypher/command/XSS), insecure CORS, missing input validation,
            path traversal, sensitive data in logs/responses, auth bypass, insecure deserialization, missing rate limiting.

            ### 2. Syntax and Bugs
            Syntax errors, logic errors, race conditions, incorrect API/library usage, unhandled exceptions,
            null/undefined refs, type mismatches, resource leaks, incorrect async/await.

            ### 3. Code Quality
            Naming, DRY violations, bare excepts, unused/dead code, performance anti-patterns (N+1, unbounded fetch,
            blocking in async), breaking changes, unnecessary complexity.

            ### 4. Test Coverage (backend code under api/)
            Suggest specific pytest tests with example code. Integration tests for endpoints. Identify untested
            edge cases and error paths. For frontend: note if critical logic lacks tests.

            ## Summary comment — post LAST as ONE `gh pr comment`

            ## 📋 Code Review Summary

            | Severity | Count |
            |----------|-------|
            | 🔴 Critical | {n} |
            | 🟡 Warning | {n} |
            | 🔵 Suggestion | {n} |
            | 🧪 Test | {n} |

            **Verdict:** {✅ APPROVE | ⚠️ REQUEST CHANGES | 💬 COMMENT}

            **Files reviewed:**
            | File | Security | Syntax | Quality | Tests |
            |------|----------|--------|---------|-------|
            | `{filepath}` | ✅ | ✅ | ✅ | ✅ / N/A |

            ## Rules
            - Each issue is a SEPARATE inline comment. The summary is the ONLY `gh pr comment`.
            - Do NOT modify any files, create commits, or push code.
            - Do NOT skip any review category for any file.
            - Do NOT flag subjective style preferences unless they violate project conventions.
            - Use suggestion blocks (Format A) whenever the fix is a direct code replacement — this gives accept buttons.
            - Use Format B only when the issue truly can't be fixed by replacing lines (design/architectural concerns).
            - Use Format C for missing tests.
            - If a file has zero issues, confirm it in the summary table.
            - If the PR is trivial (typo, config-only), post one summary comment saying so.
            - Only post comments on GitHub — do not output review text as messages.

  # ──────────────────────────────────────────────
  # @claude mention — smart assistant
  # ──────────────────────────────────────────────
  claude-mention:
    if: |
      (
        (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
      ) && (github.event.comment.author_association == 'OWNER' || github.event.comment.author_association == 'MEMBER')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude on @mention
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          classify_inline_comments: "false"
          claude_args: >-
            --model claude-opus-4-6
            --allowedTools
            "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh api:*),Read,Glob,Grep"
          trigger_phrase: "@claude"
          prompt: |
            You are Claude, a senior AI assistant for the research-ai project (FastAPI + React + Neo4j/Ricgraph).

            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}

            A team member mentioned you in a PR comment. Read their message carefully and decide what to do.

            ## Capabilities

            You can:
            - Read any file in the repo, the PR diff, and PR metadata
            - Post inline comments on specific lines with `mcp__github_inline_comment__create_inline_comment`
            - Post general PR comments with `gh pr comment`
            - Query GitHub API with `gh api`
            - Use suggestion blocks for one-click fixes

            ## Deciding what to do

            Read the user's message and follow their instructions. You are their assistant — do what they ask.

            **If asked for a PR review or re-review** ("review this PR", "re-review", "check this PR", "check again"):
            First silently run CLEANUP (see below), then follow the FULL REVIEW PROCEDURE.

            **If asked about code issues, fixes, or anything that touches the diff** ("fix this", "is this still broken",
            "check if X is fixed", "look at the issues"):
            First silently run CLEANUP (see below), then do what the user asked.
            For fix requests: do NOT modify files unless the user explicitly says to commit/push.
            Instead, post inline comments with suggestion blocks showing the fix.

            **If asked something that doesn't involve reviewing code** ("explain this function", "what does X do?",
            "how does this work?"):
            Skip cleanup. Just read the relevant code and respond with a `gh pr comment`.

            **If asked anything else**: do exactly what they asked, nothing more.

            ---

            ## CLEANUP — resolve outdated threads (run silently, no comments about it)

            When cleanup is needed (see above), run the following bash script BEFORE doing anything else.
            Do NOT post any comment about cleanup. Do NOT mention that you resolved threads. Just do it silently.

            ```
            PR_NUMBER={the PR number}
            REPO=${{ github.repository }}

            THREADS=$(gh api graphql -f query='
              query($owner: String!, $repo: String!, $pr: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $pr) {
                    reviewThreads(first: 100) {
                      nodes {
                        id
                        isResolved
                        isOutdated
                        comments(first: 1) {
                          nodes { author { login } }
                        }
                      }
                    }
                  }
                }
              }
            ' -f owner="${REPO%/*}" -f repo="${REPO#*/}" -F pr="$PR_NUMBER" \
              --jq '.data.repository.pullRequest.reviewThreads.nodes[]
                    | select(.isOutdated == true and .isResolved == false
                      and (.comments.nodes[0].author.login == "github-actions[bot]"
                        or .comments.nodes[0].author.login == "claude[bot]"))
                    | .id')

            for THREAD_ID in $THREADS; do
              gh api graphql -f query='
                mutation($id: ID!) {
                  resolveReviewThread(input: {threadId: $id}) {
                    thread { isResolved }
                  }
                }
              ' -f id="$THREAD_ID" || true
            done

            gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" --paginate --jq \
              '.[] | select((.user.login == "github-actions[bot]" or .user.type == "Bot")
                and (.body | test("Code Review Summary"))) | .node_id' | \
            while read -r node_id; do
              gh api graphql -f query='
                mutation($id: ID!) {
                  minimizeComment(input: {subjectId: $id, classifier: OUTDATED}) {
                    minimizedComment { isMinimized }
                  }
                }
              ' -f id="$node_id" || true
            done
            ```

            ---

            ## FULL REVIEW PROCEDURE

            1. Run `gh pr view` and `gh pr diff` to understand the changes.
            2. Review ONLY the diff. Read related files for context if needed.
            3. For EACH issue, post a SEPARATE inline comment with `mcp__github_inline_comment__create_inline_comment`:
               - `confirmed: true` always
               - `side: "RIGHT"` for new code, `"LEFT"` for deleted code
               - Use suggestion blocks for fixable issues
            4. Post ONE summary comment at the end with `gh pr comment`.

            ### Review categories (check ALL for every changed file):
            **Security** | **Syntax and Bugs** | **Code Quality** | **Test Coverage**
            (If the user says to skip a category, respect that.)

            ### Inline comment format:
            **Format A — fixable** (use suggestion block for one-click accept):
            {SEVERITY_EMOJI} **{Severity}** — {Category}
            {Description of the problem and why it matters.}
            ```suggestion
            {corrected code replacing the selected line range}
            ```

            **Format B — non-fixable** (architectural/design issues):
            {SEVERITY_EMOJI} **{Severity}** — {Category}
            {Clear, actionable description of the problem and what to do about it.}

            **Format C — tests:**
            🧪 **Test** — {description}
            ```python
            {example pytest code}
            ```

            Use Format A whenever the fix can be expressed as a code replacement. Use B only for design concerns.

            ### Severity: 🔴 Critical | 🟡 Warning | 🔵 Suggestion | 🧪 Test

            ### Summary (ONE `gh pr comment` at the end):
            ## 📋 Code Review Summary
            | Severity | Count |
            |----------|-------|
            | 🔴 / 🟡 / 🔵 / 🧪 | {n} |

            **Verdict:** ✅ APPROVE | ⚠️ REQUEST CHANGES | 💬 COMMENT

            ### Rules
            - Each issue is a SEPARATE inline comment. Summary is the ONLY `gh pr comment`.
            - Do NOT modify files or push code unless explicitly told to.
            - Use suggestion blocks (Format A) whenever the fix is a direct code replacement.
            - Use Format B only for truly non-fixable design/architectural issues.
            - Use Format C for test suggestions.
            - Only post comments on GitHub — do not output review text as messages.

  # ──────────────────────────────────────────────
  # Manual trigger: review files without a PR
  # ──────────────────────────────────────────────
  manual-review:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}
          fetch-depth: 0

      - name: Run Claude Manual Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          classify_inline_comments: "false"
          claude_args: >-
            --model claude-opus-4-6
            --allowedTools
            "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,Glob,Grep"
          prompt: |
            You are a code reviewer for the research-ai project (FastAPI + React + Neo4j/Ricgraph).

            Review the following files/directories: ${{ github.event.inputs.review_scope }}
            Focus area: ${{ github.event.inputs.review_focus }}

            ## Instructions by focus area

            If focus is "full-review": check all 4 categories (security, syntax, quality, tests).
            If focus is "security-only": deep-dive on hardcoded secrets, injection, XSS, CORS, auth, validation, data exposure.
            If focus is "test-suggestions": suggest pytest tests for every function/endpoint, identify untested edge cases.
            If focus is "code-quality": check naming, DRY, error handling, dead code, performance, complexity.

            ## Output

            For each issue, use `mcp__github_inline_comment__create_inline_comment` with `confirmed: true`.
            Use suggestion blocks for fixable issues. Severity: 🔴 Critical | 🟡 Warning | 🔵 Suggestion | 🧪 Test.

            End with a summary via `gh pr comment`: issue counts by severity, files reviewed, categories checked.

            ## Rules
            - Do NOT modify any files or push code.
            - Only review the specified scope.
            - Every fixable issue must use a suggestion block.
