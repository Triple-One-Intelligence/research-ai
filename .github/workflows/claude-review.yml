name: Claude Code Review

on:
  pull_request:
    types: [opened, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      review_scope:
        description: "Files or directories to review (e.g., 'api/app/routers/' or 'api/app/main.py')"
        required: true
        type: string
      review_focus:
        description: "What to focus on"
        required: false
        type: choice
        options:
          - full-review
          - security-only
          - test-suggestions
          - code-quality
        default: full-review
      branch:
        description: "Branch to review (defaults to current default branch)"
        required: false
        type: string

jobs:
  # ──────────────────────────────────────────────
  # Auto code review on PR open / reopen
  # ──────────────────────────────────────────────
  pr-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clean up previous Claude review comments
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          REPO=${{ github.repository }}

          echo "Cleaning up old inline review comments..."
          gh api "repos/${REPO}/pulls/${PR_NUMBER}/comments" --paginate --jq \
            '.[] | select(.user.login == "github-actions[bot]" or .user.type == "Bot") | .id' | \
          while read -r comment_id; do
            gh api -X DELETE "repos/${REPO}/pulls/${PR_NUMBER}/comments/${comment_id}" || true
          done

          echo "Collapsing old summary comments..."
          gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" --paginate --jq \
            '.[] | select((.user.login == "github-actions[bot]" or .user.type == "Bot") and (.body | test("Claude|Review|review|🔴|🟡|🔵|🧪"))) | "\(.id)|\(.node_id)"' | \
          while IFS='|' read -r comment_id node_id; do
            gh api graphql -f query='
              mutation {
                minimizeComment(input: {subjectId: "'"${node_id}"'", classifier: OUTDATED}) {
                  minimizedComment { isMinimized }
                }
              }
            ' || true
          done

          echo "Cleanup complete."

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model claude-opus-4-6 --allowedTools Bash Read Glob Grep"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are a code reviewer for the research-ai project (FastAPI + React + Neo4j/Ricgraph).

            IMPORTANT: Only review the CHANGED files in this PR. Do NOT review the entire codebase.

            ## Steps
            1. Run `gh pr view ${{ github.event.pull_request.number }}` to get the PR details and HEAD commit SHA
            2. Run `gh pr diff ${{ github.event.pull_request.number }}` to see exactly what changed
            3. Review ONLY the changes shown in the diff
            4. If a change looks like it could break something, you may read related files for context — but do not review files not affected by the PR
            5. For EACH issue found, post a SEPARATE comment using `gh pr comment` (one `gh pr comment` call per issue)
            6. After all issue comments, post ONE final summary comment using `gh pr comment`

            ## MANDATORY Review Categories
            You MUST check EVERY category below for EVERY file in the diff. Do NOT skip any category.

            ### 1. Security — ALWAYS CHECK
            - Hardcoded secrets, API keys, credentials, tokens, or passwords
            - SQL / Cypher / NoSQL injection vulnerabilities
            - Command injection (subprocess, os.system, eval, exec)
            - Cross-site scripting (XSS) in frontend code
            - Insecure CORS configurations
            - Missing input validation or sanitization on user-facing inputs
            - Path traversal or directory traversal risks
            - Sensitive data exposure in logs, responses, error messages
            - Authentication or authorization bypass risks
            - Insecure deserialization
            - Missing rate limiting on public endpoints

            ### 2. Syntax and Bugs — ALWAYS CHECK
            - Syntax errors, typos, or malformed code
            - Logic errors, off-by-one mistakes, wrong comparisons
            - Race conditions or concurrency issues
            - Incorrect use of APIs, libraries, or framework features
            - Unhandled exceptions or missing error propagation
            - Null/undefined reference risks
            - Type mismatches or incorrect type annotations
            - Resource leaks (unclosed files, connections, streams)
            - Incorrect async/await usage

            ### 3. Code Quality — ALWAYS CHECK
            - Unclear or inconsistent naming conventions
            - DRY violations (duplicated logic that should be extracted)
            - Missing or inadequate error handling (bare except, swallowed errors)
            - Unused imports, dead code, or unreachable code paths
            - Performance anti-patterns (N+1 queries, unbounded data fetching, blocking in async)
            - Breaking changes to existing interfaces or contracts
            - Overly complex logic that could be simplified

            ### 4. Test Coverage — ALWAYS CHECK FOR BACKEND CODE
            For any new or modified Python code under `api/`:
            - Suggest specific unit tests with example pytest code
            - Suggest integration tests for new or modified API endpoints
            - Identify untested edge cases, error paths, and boundary conditions
            For frontend code:
            - Note if critical logic lacks tests

            ## Comment Format — EACH ISSUE IS A SEPARATE COMMENT
            For every issue you find, post a SEPARATE `gh pr comment` so each one can be discussed independently.

            Each issue comment MUST follow this exact format:

            {SEVERITY_EMOJI} **{Severity}** — {Category}

            📍 **Location:** [`{filepath}` L{start}-L{end}](https://github.com/${{ github.repository }}/blob/{HEAD_SHA}/{filepath}#L{start}-L{end})

            **Current code (what's wrong):**
            ```{language}
            {the exact problematic code from the diff}
            ```

            **Issue:** {one-line description of the problem}

            **Why this matters:** {brief explanation of the risk or impact}

            **Fix — replace with:**
            ```{language}
            {the corrected code}
            ```

            ---

            Use these severity emojis exactly:
            - 🔴 **Critical** — Must fix before merge (security vulnerabilities, data loss, breaking bugs)
            - 🟡 **Warning** — Should fix (potential bugs, missing error handling, performance issues)
            - 🔵 **Suggestion** — Consider fixing (code quality, readability, best practices)
            - 🧪 **Test** — Missing test coverage (include example pytest code in the fix)

            IMPORTANT for the location link:
            - Get the HEAD commit SHA from `gh pr view` output
            - Build the GitHub link as: https://github.com/${{ github.repository }}/blob/{SHA}/{filepath}#L{start}-L{end}
            - This makes the location clickable so the reviewer can jump straight to the code

            ## Summary Comment — POST LAST, AS A SINGLE COMMENT
            After ALL individual issue comments, post ONE final summary comment:

            ## 📋 Code Review Summary

            | Severity | Count |
            |----------|-------|
            | 🔴 Critical | {n} |
            | 🟡 Warning | {n} |
            | 🔵 Suggestion | {n} |
            | 🧪 Test | {n} |

            **Verdict:** {✅ APPROVE | ⚠️ REQUEST CHANGES | 💬 COMMENT}

            **Files reviewed:**
            | File | Security | Syntax | Quality | Tests |
            |------|----------|--------|---------|-------|
            | [`{filepath}`](link) | ✓ | ✓ | ✓ | ✓ / N/A |

            **Test suggestions:** (consolidated list with example code)

            ## Rules
            - Post each issue as a SEPARATE comment using `gh pr comment`. Do NOT combine issues into one comment.
            - The summary is the ONLY comment that combines multiple things.
            - Do NOT modify any files, create commits, or push code.
            - Do NOT skip any review category for any file.
            - Do NOT flag subjective style preferences unless they violate project conventions.
            - Every issue MUST show the current wrong code AND the fix.
            - Every location MUST be a clickable GitHub link.
            - If a file has zero issues, confirm you reviewed it in the summary.
            - If the PR is trivial (typo, config change), post one comment saying so and approve.

  # ──────────────────────────────────────────────
  # @claude mention — do whatever the person asks
  # ──────────────────────────────────────────────
  claude-mention:
    if: >
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' &&
       contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude on @mention
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model claude-opus-4-6 --allowedTools Bash Read Glob Grep"
          trigger_phrase: "@claude"
          prompt: |
            You are Claude, an AI assistant for the research-ai project (FastAPI + React + Neo4j/Ricgraph).

            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}

            A team member mentioned you in a PR comment. Do exactly what they asked — nothing more, nothing less.
            You have full access to read the codebase, the PR diff, and any files.

            Some examples of what they might ask:
            - "Review the full codebase" → read and review all relevant files, not just the diff
            - "Check only security" → focus only on security issues
            - "Explain this function" → explain it
            - "Is this approach okay?" → give your opinion
            - "Review just the diff" → review only the PR diff

            Always respond by posting a comment on the PR using `gh pr comment`.
            Do NOT modify any files, create commits, or push code unless explicitly asked to.

  # ──────────────────────────────────────────────
  # Manual trigger: review files without a PR
  # ──────────────────────────────────────────────
  manual-review:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}
          fetch-depth: 0

      - name: Run Claude Manual Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model claude-opus-4-6 --allowedTools Bash Read Glob Grep"
          prompt: |
            You are a code reviewer for the research-ai project (FastAPI + React + Neo4j/Ricgraph).

            Review the following files/directories: ${{ github.event.inputs.review_scope }}
            Focus area: ${{ github.event.inputs.review_focus }}

            ## Instructions by focus area

            If focus is "full-review": check all 4 categories (security, syntax, quality, tests).
            If focus is "security-only": deep-dive on hardcoded secrets, injection, XSS, CORS, auth, validation, data exposure.
            If focus is "test-suggestions": suggest pytest tests for every function/endpoint, identify untested edge cases.
            If focus is "code-quality": check naming, DRY, error handling, dead code, performance, complexity.

            ## Output
            One comment per issue:
            - Severity: 🔴 Critical | 🟡 Warning | 🔵 Suggestion | 🧪 Test
            - File and line, what is wrong and why, concrete fix with code

            End with summary: issue counts by severity, files reviewed, categories checked.

            ## Rules
            - Do NOT modify any files or push code.
            - Only review the specified scope.
            - Every issue must include a concrete fix.
