name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel previous runs on the same PR when a new commit is pushed.
# Pushes to master always run to completion (deploy pipeline).
concurrency:
  group: ci-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: write

jobs:
  # ── Branch name validation ────────────────────────────────────
  branch-name:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check branch naming convention
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          PATTERN='^(feat|fix|test|docs|refactor)/[A-Za-z0-9]+-.*$'
          if [[ ! "$BRANCH" =~ $PATTERN ]]; then
            echo "::error::Branch name '$BRANCH' does not follow naming convention."
            echo ""
            echo "Expected format: {type}/{ticket}-{description}"
            echo "  Types: feat/ fix/ test/ docs/ refactor/"
            echo "  Examples:"
            echo "    feat/V26J-153-authenticatie-interne-systemen"
            echo "    fix/V26J-42-broken-neo4j-connection"
            echo "    docs/V26J-99-api-reference-update"
            exit 1
          fi
          echo "Branch name '$BRANCH' is valid"

  # ── Python unit tests (GitHub-hosted, free, fully mocked) ────
  test-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: api/requirements*.txt

      - name: Install dependencies
        run: pip install -r api/requirements.txt -r api/requirements-dev.txt

      - name: Run unit tests
        working-directory: api
        run: python -m pytest -m "not smoke and not integration" -v --tb=short

  # ── Frontend build check (GitHub-hosted, free) ────────────────
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        working-directory: frontend
        run: |
          npm ci
          npm run build

  # ── Deploy to production (self-hosted, auto after merge) ────────
  # Only rebuilds API + frontend. Does NOT touch Neo4j/Ollama/Ricgraph.
  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: [test-api, build-frontend]
    runs-on: [self-hosted, linux, production]
    steps:
      - uses: actions/checkout@v4

      - name: Deploy API + frontend
        run: make ci-deploy
