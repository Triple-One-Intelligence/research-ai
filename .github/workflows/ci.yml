name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  # ── Branch name validation ────────────────────────────────────
  branch-name:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check branch naming convention
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          PATTERN='^(feat|fix|test|docs|refactor)/[A-Za-z0-9]+-.*$'
          if [[ ! "$BRANCH" =~ $PATTERN ]]; then
            echo "::error::Branch name '$BRANCH' does not follow naming convention."
            echo ""
            echo "Expected format: {type}/{ticket}-{description}"
            echo "  Types: feat/ fix/ test/ docs/ refactor/"
            echo "  Examples:"
            echo "    feat/V26J-153-authenticatie-interne-systemen"
            echo "    fix/V26J-42-broken-neo4j-connection"
            echo "    docs/V26J-99-api-reference-update"
            exit 1
          fi
          echo "Branch name '$BRANCH' is valid"

  # ── Python unit tests (GitHub-hosted, free) ───────────────────
  test-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: api/requirements*.txt

      - name: Install dependencies
        run: pip install -r api/requirements.txt -r api/requirements-dev.txt

      - name: Run unit tests
        working-directory: api
        run: python -m pytest -m unit -v --tb=short

  # ── Frontend build check (GitHub-hosted, free) ────────────────
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        working-directory: frontend
        run: |
          npm ci
          npm run build

  # ── Integration tests (self-hosted, push to master only) ──────
  test-integration:
    if: github.event_name == 'push'
    needs: [test-api, build-frontend]
    runs-on: [self-hosted, linux, production]
    steps:
      - uses: actions/checkout@v4

      - name: Build test image
        run: |
          podman build -t research-ai-api:dev -f ./api/Containerfile . -q
          podman build -t research-ai-test:dev -f ./api/Containerfile.test . -q

      - name: Run integration tests
        run: |
          podman run --rm --network host \
            -v ./api:/work:ro \
            -e FORCE_COLOR=1 \
            research-ai-test:dev \
            python -m pytest tests/test_smoke_dev.py tests/test_integration_api.py \
            -v --tb=short

  # ── Deploy (self-hosted, requires approval) ───────────────────
  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: [test-integration]
    runs-on: [self-hosted, linux, production]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        run: make deploy
