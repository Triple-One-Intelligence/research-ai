name: Archive merged branches

on:
  pull_request:
    types: [closed]

jobs:
  archive-branch:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Tag and delete merged branch
        env:
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          git fetch origin "$BRANCH"
          MERGE_SHA=$(git rev-parse "refs/remotes/origin/$BRANCH")
          git tag "archive/$BRANCH" "$MERGE_SHA"
          git push origin "refs/tags/archive/$BRANCH"
          git push origin --delete "$BRANCH"
