name: Preview Cleanup

on:
  pull_request:
    types: [closed]

jobs:
  cleanup:
    runs-on: [self-hosted, linux, production]
    env:
      XDG_RUNTIME_DIR: /run/user/500000
      DBUS_SESSION_BUS_ADDRESS: unix:path=/run/user/500000/bus
    steps:
      - name: Destroy preview pod
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          POD_NAME="preview-pr-${PR_NUMBER}"

          # Stop and disable systemd service
          systemctl --user disable --now "pod-${POD_NAME}.service" 2>/dev/null || true
          rm -f ~/.config/systemd/user/pod-${POD_NAME}.service
          rm -f ~/.config/systemd/user/container-${POD_NAME}-*.service
          systemctl --user daemon-reload 2>/dev/null || true

          # Remove pod and containers
          if podman pod exists "${POD_NAME}" 2>/dev/null; then
            podman pod rm -f "${POD_NAME}"
            echo "Destroyed preview pod: ${POD_NAME}"
          else
            echo "No preview pod found for PR #${PR_NUMBER}"
          fi

          # Clean up PR-tagged images
          podman rmi "research-ai-api:pr-${PR_NUMBER}" 2>/dev/null || true
          podman image prune -f 2>/dev/null || true
